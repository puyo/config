
# --- prefix: Ctrl-Space instead of Ctrl-b ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# --- mouse: scrolling yes, selection no ---
# Keep mouse on so two-finger trackpad scroll drives tmux history.
set -g mouse on
set -g mode-keys vi
set -g status-keys vi

# Don't let trackpad clicks/drags start a tmux selection. A trackpad click
# carries micro-drift that tmux reads as a drag -> begin-selection. To select
# text, hold SHIFT and drag: that bypasses tmux and uses the terminal's own
# selection -> clean, and only lands in the clipboard on purpose.
unbind -T root         MouseDrag1Pane
unbind -T root         MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# vi keyboard selection in copy mode, for when you DO want to copy by keyboard
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
